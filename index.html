<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>CLAUDE.md 생성기</title>
  <style>/* CLAUDE.md Generator — self-contained styles (system fonts only). */
:root {
  --bg: #f4f6fb;
  --panel: #ffffff;
  --ink: #1d2433;
  --muted: #6b7280;
  --line: #e3e8f0;
  --accent: #4f46e5;
  --accent-ink: #ffffff;
  --ok: #15803d;
  --code-bg: #f1f3f9;
  --shadow: 0 1px 3px rgba(20, 30, 60, 0.08), 0 8px 24px rgba(20, 30, 60, 0.06);
}
body.dark {
  --bg: #0f1320;
  --panel: #171c2c;
  --ink: #e7ebf5;
  --muted: #9aa3b8;
  --line: #2a3148;
  --accent: #7c83ff;
  --accent-ink: #0f1320;
  --ok: #4ade80;
  --code-bg: #0c101b;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic",
    "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
}

/* --- header --- */
header.app-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 12px 18px;
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow);
}
.app-bar h1 { font-size: 1.15rem; margin: 0; }
.app-bar .subtitle { color: var(--muted); font-size: 0.85rem; margin: 0; }
.app-bar .spacer { flex: 1 1 auto; }
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.lang-btn {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.85rem;
}
.lang-btn.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

.range-wrap { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); }

/* --- layout --- */
main {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(0, 1.4fr);
  gap: 16px;
  padding: 16px;
  max-width: 1500px;
  margin: 0 auto;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  box-shadow: var(--shadow);
  min-width: 0;
}
.panel h2 { font-size: 1rem; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }

/* --- inputs --- */
.status { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; }
.status.ok { color: var(--ok); font-weight: 600; }
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.field-token {
  font-weight: 400;
  color: var(--muted);
  font-size: 0.72rem;
  margin-left: 6px;
  font-family: ui-monospace, "Consolas", monospace;
}
.field label .req { color: #dc2626; font-weight: 700; }
textarea, input[type="text"] {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
  font: inherit;
  color: var(--ink);
  background: var(--bg);
  resize: vertical;
}
textarea { overflow: hidden; min-height: 38px; }
textarea:focus, input[type="text"]:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

/* --- buttons --- */
button {
  font: inherit;
  cursor: pointer;
}
.btn {
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--ink);
  border-radius: 9px;
  padding: 8px 12px;
  font-size: 0.85rem;
}
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn:hover { filter: brightness(0.97); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

.icon-btn {
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--ink);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 1.05rem;
  line-height: 1;
}
.icon-btn:hover { filter: brightness(0.97); }
.icon-btn.save { background: var(--accent); border-color: var(--accent); }
button:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

/* --- preview header (tabs + tools) --- */
.preview-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.tabs { display: flex; gap: 4px; }
.tab {
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.88rem;
  font-weight: 600;
}
.tab.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.preview-tools { margin-left: auto; display: flex; gap: 6px; }

/* --- inline template editor --- */
.template-edit {
  width: 100%;
  min-height: 60vh;
  max-height: 70vh;
  overflow: auto;
  font-family: ui-monospace, "Consolas", monospace;
  font-size: 0.82rem;
  line-height: 1.5;
  resize: vertical;
}
.template-edit[hidden] { display: none; }

/* --- preview --- */
.preview-wrap {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg);
  padding: 14px;
  overflow: auto;
  max-height: 70vh;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  /* Allow one-finger pan/scroll; two-finger pinch is handled in JS. */
  touch-action: pan-x pan-y;
}
.preview {
  font-size: 15px;
  word-break: break-word;
}
.preview h1 { font-size: 1.4rem; border-bottom: 2px solid var(--line); padding-bottom: 6px; }
.preview h2 { font-size: 1.15rem; margin-top: 18px; }
.preview h3 { font-size: 1rem; }
.preview code {
  background: var(--code-bg);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: ui-monospace, "Consolas", monospace;
  font-size: 0.85em;
}
.preview pre {
  background: var(--code-bg);
  padding: 10px 12px;
  border-radius: 8px;
  overflow: auto;
}
.preview pre code { background: none; padding: 0; }
.preview ul { padding-left: 22px; }
.preview p { margin: 8px 0; }

.muted { color: var(--muted); font-size: 0.85rem; }
.notice {
  display: none;
  margin-top: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  background: #fff7ed;
  color: #9a3412;
  font-size: 0.8rem;
}
.notice.show { display: block; }

/* --- toast --- */
#toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--bg);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 50;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 12px; }

/* --- responsive: tablet / folded --- */
@media (max-width: 720px) {
  main { grid-template-columns: 1fr; }
  .app-bar h1 { font-size: 1rem; }
}

/* --- high-resolution unfolded (e.g. Galaxy Fold7 main screen) --- */
@media (min-width: 1800px) {
  body { font-size: 18px; }
  main { max-width: 2000px; }
}
</style>
</head>

  <header class="app-bar">
    <div>
      <h1 data-i18n="appTitle">CLAUDE.md 생성기</h1>
      <p class="subtitle" data-i18n="appSubtitle">템플릿에 값을 채워 CLAUDE.md를 만드세요</p>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <span class="range-wrap">
        <span data-i18n="fontSize">글자 크기</span>

  </header>

  <main>

    <section class="panel inputs">

          <button id="resetBtn" class="icon-btn" type="button" data-i18n-title="reset" title="초기화">🔄</button>
          <button id="copyBtn" class="icon-btn" type="button" data-i18n-title="copy" title="복사">📋</button>

    </section>
  </main>

  <footer>

  </footer>
