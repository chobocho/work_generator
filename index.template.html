<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>CLAUDE.md 생성기</title>
  <style>/*INLINE_CSS*/</style>
</head>
<body>
  <header class="app-bar">
    <div>
      <h1 data-i18n="appTitle">CLAUDE.md 생성기</h1>
      <p class="subtitle" data-i18n="appSubtitle">템플릿에 값을 채워 CLAUDE.md를 만드세요</p>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <span class="range-wrap">
        <span data-i18n="fontSize">글자 크기</span>
        <input id="fontRange" type="range" min="12" max="24" value="15" />
      </span>
      <button id="themeToggle" class="btn" type="button" title="theme">🌓</button>
      <button class="lang-btn active" data-lang="ko" type="button">KO</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <main>
    <!-- Inputs -->
    <section class="panel inputs">
      <h2><span>📝</span><span data-i18n="inputs">입력 값</span></h2>
      <div id="status" class="status"></div>
      <div id="fields"></div>
      <div id="dbNotice" class="notice"></div>
    </section>

    <!-- Preview / Template -->
    <section class="panel preview-panel">
      <div class="preview-head">
        <div class="tabs">
          <button class="tab active" type="button" data-view="preview" data-i18n="preview">미리보기</button>
          <button class="tab" type="button" data-view="template" data-i18n="template">템플릿</button>
        </div>
        <div class="preview-tools">
          <button id="resetBtn" class="icon-btn" type="button" data-i18n-title="reset" title="초기화">🔄</button>
          <button id="copyBtn" class="icon-btn" type="button" data-i18n-title="copy" title="복사">📋</button>
          <button id="downloadBtn" class="icon-btn save" type="button" data-i18n-title="save" title="CLAUDE.md 저장">💾</button>
        </div>
      </div>

      <div id="previewWrap" class="preview-wrap">
        <div id="previewStage">
          <article id="preview" class="preview"></article>
        </div>
      </div>
      <textarea id="templateText" class="template-edit" spellcheck="false" hidden></textarea>
    </section>
  </main>

  <footer>
    <span data-i18n="zoomHint">두 손가락으로 확대/축소할 수 있습니다</span>
  </footer>

  <div id="toast"></div>

  <script>window.__DEFAULT_TEMPLATE__ = /*INLINE_TEMPLATE*/"";</script>
  <script>/*INLINE_JS*/</script>
</body>
</html>
