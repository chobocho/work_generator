<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>CLAUDE.md 생성기</title>
  <style>/*INLINE_CSS*/</style>
</head>
<body>
  <header class="app-bar">
    <div>
      <h1 data-i18n="appTitle">CLAUDE.md 생성기</h1>
      <p class="subtitle" data-i18n="appSubtitle">템플릿에 값을 채워 CLAUDE.md를 만드세요</p>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <span class="range-wrap">
        <span data-i18n="fontSize">글자 크기</span>
        <input id="fontRange" type="range" min="12" max="24" value="15" />
      </span>
      <button id="themeToggle" class="btn" type="button" title="theme">🌓</button>
      <button class="lang-btn active" data-lang="ko" type="button">KO</button>
      <button class="lang-btn" data-lang="en" type="button">EN</button>
    </div>
  </header>

  <main>
    <!-- Inputs -->
    <section class="panel inputs">
      <h2><span>📝</span><span data-i18n="inputs">입력 값</span></h2>
      <div id="status" class="status"></div>
      <div id="fields"></div>

      <div id="templatePanel" class="template-panel">
        <button id="toggleTemplate" class="btn" type="button" data-i18n="editTemplate">템플릿 편집</button>
        <div class="body">
          <textarea id="templateText" spellcheck="false"></textarea>
          <div class="btn-row">
            <button id="loadTemplateBtn" class="btn" type="button" data-i18n="loadTemplateFile">템플릿 파일 불러오기</button>
            <button id="resetTemplateBtn" class="btn" type="button" data-i18n="resetTemplate">기본 템플릿으로</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Preview -->
    <section class="panel preview-panel">
      <h2>
        <span>👁️</span><span data-i18n="preview">미리보기</span>
        <span class="spacer"></span>
      </h2>
      <div class="btn-row" style="margin-top:0;margin-bottom:10px;">
        <button id="copyBtn" class="btn" type="button" data-i18n="copy">복사</button>
        <button id="downloadBtn" class="btn primary" type="button" data-i18n="download">CLAUDE.md 다운로드</button>
      </div>
      <div id="previewWrap" class="preview-wrap">
        <div id="previewStage">
          <article id="preview" class="preview"></article>
        </div>
      </div>
    </section>

    <!-- Library -->
    <section class="panel library">
      <h2><span>💾</span><span data-i18n="library">저장된 작업물</span></h2>
      <input id="workName" type="text" data-i18n-ph="workName" />
      <div class="btn-row">
        <button id="saveBtn" class="btn primary" type="button" data-i18n="save">저장</button>
        <button id="saveAsNewBtn" class="btn" type="button" data-i18n="saveAsNew">새로 저장</button>
        <button id="newBtn" class="btn" type="button" data-i18n="newWork">새 작업</button>
      </div>
      <div id="worksList"></div>
      <div class="btn-row">
        <button id="exportBtn" class="btn" type="button" data-i18n="exportAll">전체 내보내기(JSON)</button>
        <button id="importBtn" class="btn" type="button" data-i18n="importAll">가져오기(JSON)</button>
      </div>
      <div id="dbNotice" class="notice"></div>
    </section>
  </main>

  <footer>
    <span data-i18n="zoomHint">두 손가락으로 확대/축소할 수 있습니다</span>
  </footer>

  <div id="toast"></div>

  <!-- Hidden file pickers -->
  <input id="importFile" type="file" accept="application/json,.json" style="display:none" />
  <input id="templateFile" type="file" accept=".data,.md,.txt,text/plain" style="display:none" />

  <script>window.__DEFAULT_TEMPLATE__ = /*INLINE_TEMPLATE*/"";</script>
  <script>/*INLINE_JS*/</script>
</body>
</html>
